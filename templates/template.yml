services:
  # --- THE MAIN APP (PHP 8.4 + Nginx + s6 + Reverb) ---
  app:
    build:
      context: .
      dockerfile: customer.Dockerfile
    container_name: "${CUSTOMER_ID}_app"
    restart: unless-stopped
    mem_limit: "${RAM_LIMIT}"
    cpus: "${APP_CPUS:-0.5}"
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./www:/var/www/html
      # Mount crontabs so customers can edit them
      - ./config/cron:/etc/cron.d
    networks:
      - web-proxy
      - tenant-internal
    labels:
      - "traefik.enable=true"
      # Main Site
      - "traefik.http.routers.${CUSTOMER_ID}.rule=Host(`${PRIMARY_DOMAIN}`)"
      - "traefik.http.routers.${CUSTOMER_ID}.entrypoints=web"
      # Laravel Reverb (WebSocket Support)
      - "traefik.http.middlewares.${CUSTOMER_ID}-reverb.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.${CUSTOMER_ID}.middlewares=${CUSTOMER_ID}-reverb"

  # --- DATABASE ---
  db:
    image: mariadb:10.11
    container_name: "${CUSTOMER_ID}_db"
    restart: unless-stopped
    mem_limit: "${DB_RAM_LIMIT:-256M}"
    cpus: "${DB_CPUS:-0.25}"
    pids_limit: 256
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
      MYSQL_DATABASE: "main_db"
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - tenant-internal

  # --- FILE MANAGER ---
  files:
    image: filebrowser/filebrowser:s6
    container_name: "${CUSTOMER_ID}_files"
    restart: unless-stopped
    mem_limit: "${FILES_RAM_LIMIT:-128M}"
    cpus: "${FILES_CPUS:-0.2}"
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./www:/srv
      - ./filebrowser.db:/database.db
    networks:
      - web-proxy
      - tenant-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${CUSTOMER_ID}_files.rule=Host(`files.${CUSTOMER_ID}.${HOST_DOMAIN}`)"
      - "traefik.http.routers.${CUSTOMER_ID}_files.entrypoints=web"
      - "traefik.http.routers.${CUSTOMER_ID}_files.middlewares=${CUSTOMER_ID}-basic"
      - "traefik.http.middlewares.${CUSTOMER_ID}-basic.basicauth.users=${BASIC_AUTH}"

  # --- SSH ACCESS ---
  ssh:
    image: linuxserver/openssh-server
    container_name: "${CUSTOMER_ID}_ssh"
    restart: unless-stopped
    mem_limit: "${SSH_RAM_LIMIT:-128M}"
    cpus: "${SSH_CPUS:-0.2}"
    pids_limit: 128
    ports:
      - "${SSH_PORT}:22"
    environment:
      - PUID=1000
      - PGID=1000
      - USER_PASSWORD=${SSH_PASSWORD}
      - PASSWORD_ACCESS=true
    volumes:
      - ./www:/var/www/html
    networks:
      - tenant-internal

  # --- PHPMYADMIN ---
  pma:
    image: phpmyadmin:5.2
    container_name: "${CUSTOMER_ID}_pma"
    restart: unless-stopped
    mem_limit: "${PMA_RAM_LIMIT:-128M}"
    cpus: "${PMA_CPUS:-0.2}"
    pids_limit: 128
    environment:
      PMA_HOST: "db"
      PMA_PORT: "3306"
      UPLOAD_LIMIT: "64M"
      PMA_ABSOLUTE_URI: "https://pma.${CUSTOMER_ID}.${HOST_DOMAIN}/"
    networks:
      - web-proxy
      - tenant-internal
    depends_on:
      - db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${CUSTOMER_ID}_pma.rule=Host(`pma.${CUSTOMER_ID}.${HOST_DOMAIN}`)"
      - "traefik.http.routers.${CUSTOMER_ID}_pma.entrypoints=web"
      - "traefik.http.routers.${CUSTOMER_ID}_pma.middlewares=${CUSTOMER_ID}-basic"
      - "traefik.http.middlewares.${CUSTOMER_ID}-basic.basicauth.users=${BASIC_AUTH}"

networks:
  web-proxy:
    external: true
  tenant-internal:
    internal: true
